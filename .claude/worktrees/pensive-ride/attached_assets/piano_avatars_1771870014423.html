<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Avatars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f0e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    font-family: 'Cormorant Garamond', Georgia, serif;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #1a1410;
    margin-bottom: 48px;
    opacity: 0.6;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 100px);
    gap: 20px;
  }

  .avatar-card {
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-wrap {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    overflow: hidden;
    transition: box-shadow 0.25s ease, transform 0.2s ease;
    box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  }

  .avatar-card:hover .avatar-wrap {
    transform: translateY(-4px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  }

  .avatar-card.selected .avatar-wrap {
    box-shadow: 0 0 0 2.5px #1a1410, 0 6px 24px rgba(0,0,0,0.22);
    transform: translateY(-2px);
  }

  .avatar-wrap svg {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
